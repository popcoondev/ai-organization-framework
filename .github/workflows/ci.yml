name: CI

on:
  push:
    paths-ignore:
      - '.aof/**'
  pull_request:
    paths-ignore:
      - '.aof/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run automated tests
        run: npm test

      - name: Run CLI smoke test
        run: npm run smoke
