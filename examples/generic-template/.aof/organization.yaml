organization_id: civic-studio
name: Civic Studio
language: en
mission: Deliver service and environment outcomes beyond software
governance_scopes:
  - concept-approval
  - launch-approval
clarification:
  use_default_high_stakes_patterns: false
  use_default_brownfield_patterns: false
  high_stakes_terms:
    - structural
    - safeguarding
  brownfield_terms:
    - retrofit
    - legacy
  question_policy:
    initial_question_budget: 2
    followup_budget: 1
    max_rounds: 2
    priority_order:
      - high-stakes-risk
      - missing-constraint
      - brownfield-gap
      - missing-success-criteria
      - missing-prohibition
  copy:
    en:
      questions:
        scope: Which service touchpoint or environment should this redesign cover, and what should stay out of scope?
      rationales:
        scope: This bounds the service-design effort before planning and proposal work begin.
      summary_initial_questions: runtime identified service-design clarification gaps and generated first-round questions
