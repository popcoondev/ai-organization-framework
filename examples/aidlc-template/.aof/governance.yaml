model: council-of-three
decision_rules:
  default: majority-with-guardian-veto
escalation:
  target: human-maintainer
  max_retries: 2
routing:
  fast_track:
    allowed_when:
      - low-blast-radius
      - reversible
      - low-safety-impact
assignment_authority:
  mode: template-default
  owner: runtime
  override_allowed: human-maintainer
